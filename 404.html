<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | High-Rise Harvest</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <style>
        .error-page { min-height: 100vh; display: flex; flex-direction: column; }
        .error-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 5%;
            background-color: #faf8f5;
        }
        .error-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: errorBounce 1.5s ease-in-out infinite alternate;
        }
        @keyframes errorBounce {
            from { transform: translateY(0) rotate(-5deg); }
            to   { transform: translateY(-12px) rotate(5deg); }
        }
        .error-code { font-size: 5rem; color: #2e4a3f; line-height: 1; margin-bottom: 1rem; }
        .error-title { font-size: 1rem; color: #e67e22; margin-bottom: 1.5rem; line-height: 1.6; }
        .error-message { font-size: 0.7rem; color: #777; max-width: 480px; line-height: 2; margin-bottom: 2.5rem; }
        .error-divider { width: 60px; height: 3px; background: #e67e22; border-radius: 2px; margin: 0 auto 2.5rem; }
        .error-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
        .btn-home {
            background-color: #2e4a3f; color: white; padding: 0.8rem 1.5rem;
            border: none; border-radius: 5px; cursor: pointer; font-size: 0.7rem;
            text-decoration: none; transition: background 0.3s ease, transform 0.3s ease;
            font-family: 'Press Start 2P', system-ui, sans-serif;
        }
        .btn-home:hover { background-color: #1c3027; transform: translateY(-3px); }
        .btn-download-alt {
            background-color: #e67e22; color: white; padding: 0.8rem 1.5rem;
            border: none; border-radius: 5px; cursor: pointer; font-size: 0.7rem;
            text-decoration: none; transition: background 0.3s ease, transform 0.3s ease;
            font-family: 'Press Start 2P', system-ui, sans-serif;
        }
        .btn-download-alt:hover { background-color: #d35400; transform: translateY(-3px); }
        .error-nav-links { margin-top: 3rem; display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
        .error-nav-links a { font-size: 0.55rem; color: #aaa; text-decoration: none; transition: color 0.3s ease; }
        .error-nav-links a:hover { color: #2e4a3f; }
        @media (max-width: 600px) {
            .error-code { font-size: 3.5rem; }
            .error-title { font-size: 0.8rem; }
            .error-actions { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body class="error-page">
    <nav class="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="/assets/logo.png" alt="High-Rise Harvest Logo">
                <span class="logo-text">High-Rise Harvest</span>
            </a>
        </div>
    </nav>
    <main class="error-hero">
        <div class="error-icon">🌾</div>
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Crop Not Found</h2>
        <div class="error-divider"></div>
        <p class="error-message">Looks like this page got eaten by a boar. The page you're looking for doesn't exist or may have been moved.</p>
        <div class="error-actions">
            <a href="index.html" class="btn-home">&#8592; Back to Home</a>
            <a href="index.html#download" class="btn-download-alt">Download Game</a>
        </div>
        <nav class="error-nav-links">
            <a href="index.html#about">About</a>
            <a href="index.html#features">Features</a>
            <a href="index.html#media">Media</a>
            <a href="index.html#news">News</a>
            <a href="index.html#team">Team</a>
        </nav>
    </main>
    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 Ink & Embers · All Rights Reserved.</p>
        </div>
    </footer>
</body>
</html>
